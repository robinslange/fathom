name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS bundle
    runs-on: macos-15
    timeout-minutes: 60
    env:
      CMAKE_OSX_DEPLOYMENT_TARGET: "12.0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          # Shared key with ci.yml's desktop job — they build the same
          # Tauri bundle, so let cache hits cross-pollinate.
          shared-key: "macos-tauri-bundle"

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app bundle
        working-directory: apps/desktop
        run: pnpm tauri build

      - name: Ad-hoc codesign the bundle
        working-directory: target/release/bundle/macos
        run: |
          codesign --force --deep --sign - Fathom.app
          codesign --verify --deep --strict --verbose=2 Fathom.app

      - name: Zip the .app
        working-directory: target/release/bundle/macos
        run: ditto -c -k --sequesterRsrc --keepParent Fathom.app Fathom-macos.zip

      - name: Publish rolling `latest` prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build from main"
          body: |
            Rolling build from the latest commit on `main` (${{ github.sha }}).

            This is a prerelease that is replaced on every push to `main`. For a
            pinned, versioned build, watch for `v*` tags on the Releases page.
          prerelease: true
          make_latest: "false"
          files: target/release/bundle/macos/Fathom-macos.zip
          fail_on_unmatched_files: true

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/macos/Fathom-macos.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
