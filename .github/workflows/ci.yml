name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust workspace (macOS)
    runs-on: macos-15
    timeout-minutes: 30
    env:
      # llama.cpp's bundled C++ uses std::filesystem::path; cmake-rs ignores
      # MACOSX_DEPLOYMENT_TARGET, but llama-cpp-sys-2 forwards CMAKE_-prefixed
      # env vars as -D defines, so this is the lever that actually reaches the
      # C++ compiler. See `.cargo/config.toml`.
      CMAKE_OSX_DEPLOYMENT_TARGET: "12.0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo check (workspace)
        run: cargo check --workspace

      - name: cargo test (workspace)
        run: cargo test --workspace

      - name: cargo build CLI (release smoke)
        run: cargo build --release -p fathom-cli

  desktop:
    name: Desktop app (macOS)
    runs-on: macos-15
    timeout-minutes: 45
    env:
      CMAKE_OSX_DEPLOYMENT_TARGET: "12.0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Type-check Svelte
        working-directory: apps/desktop
        run: pnpm check

      - name: Build frontend
        working-directory: apps/desktop
        run: pnpm build

      - name: Build Tauri app bundle
        if: github.event_name == 'pull_request'
        working-directory: apps/desktop
        run: pnpm tauri build
