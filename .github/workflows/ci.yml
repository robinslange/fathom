name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust workspace (macOS)
    runs-on: macos-15
    timeout-minutes: 30
    env:
      # llama.cpp's bundled C++ uses std::filesystem::path; cmake-rs ignores
      # MACOSX_DEPLOYMENT_TARGET, but llama-cpp-sys-2 forwards CMAKE_-prefixed
      # env vars as -D defines, so this is the lever that actually reaches the
      # C++ compiler. See `.cargo/config.toml`.
      CMAKE_OSX_DEPLOYMENT_TARGET: "12.0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo check (workspace)
        run: cargo check --workspace

      - name: cargo test (workspace)
        run: cargo test --workspace

      - name: cargo build CLI (release smoke)
        run: cargo build --release -p fathom-cli

  desktop:
    name: Desktop app (macOS)
    runs-on: macos-15
    timeout-minutes: 45
    env:
      CMAKE_OSX_DEPLOYMENT_TARGET: "12.0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci

      - name: Type-check Svelte
        working-directory: apps/desktop
        run: npm run check

      - name: Build frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Build Tauri app bundle
        working-directory: apps/desktop
        run: npm run tauri -- build

      - name: Upload Fathom.app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fathom-macos
          path: target/release/bundle/macos/Fathom.app
          if-no-files-found: error
          retention-days: 14
